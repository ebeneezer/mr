    - date: "2026-04-01"
      topic: "Workspace- und Doku-Konvention"
      notes:
        - "Markdown-Dokumente werden unter documentation/ gepflegt."
        - "misc/ ist nur temporaere Muellhalde/Probe-Ablage."
        - "Workspace-Hygiene als verbindliche Regel aufgenommen."
    - date: "2026-04-01"
      topic: "Regression- und Probe-Zentralisierung"
      notes:
        - "Legacy-Probes in misc entfernt und in regression/mr-regression-checks.cpp zentralisiert."
        - "mrmac-v1-suite nutzt regression/mr-regression-checks --probe staged-nav|staged-mark-page."
    - date: "2026-04-01"
      topic: "TVCALL und Sprachstand"
      notes:
        - "VM-Dispatch fuer TVCALL MESSAGEBOX case-insensitiv umgesetzt."
        - "MRMAC gegen Referenzhandbuch abgeglichen; fehlende/partielle Kommandogruppen dokumentiert."
    - date: "2026-04-01"
      topic: "Setup Paths + Runtime-Pfade"
      notes:
        - "Installation / Paths Subdialog implementiert: SETTINGSPATH, MACROPATH, HELPPATH, TEMPDIR, SHELLPATH."
        - "Done schreibt settings.mrmac und reloadet Settings silent zur Laufzeit (kein Neustart)."
