        - "Unbekannte Keys aus settings.mrmac werden still verworfen."
        - "Fehlende Keys werden still aus den Defaults des Compilats aufgefuellt."
        - "SETTINGS_VERSION wird auf die Version des Compilats normalisiert."
        - "Load, Save und Bootstrap docken an denselben zentralen Key/Value-Stores an."
        - "Keine Registry und keine zweite allgemeine Metaschicht."
