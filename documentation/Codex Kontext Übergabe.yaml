session_handover:
  meta:
    created_on: "2026-04-01"
    purpose: "Kontextwechsel mit voller Projekt- und Stiluebergabe"
    authoritative_policy_source: "/home/idoc/mr/documentation/Codex Kontext Übergabe.yaml"
    related_docs:
      - "/home/idoc/mr/documentation/CHANGELOG_CONTEXT.md"
      - "/home/idoc/mr/documentation/KONTEXTWECHSEL_2026-04-01.md"
      - "/home/idoc/mr/documentation/MRMAC_V1_STATUS.md"
    warmup_priority:
      - "Zuerst: /home/idoc/mr/documentation/Codex Kontext Übergabe.yaml lesen (einzige verbindliche Regelquelle)."
      - "Danach: /home/idoc/mr/documentation/CHANGELOG_CONTEXT.md lesen (laufendes Protokoll)."
      - "Danach: /home/idoc/mr/documentation/MRMAC_V1_STATUS.md lesen (verbindlicher Sprach-/VM-Status)."
      - "KONTEXTWECHSEL_2026-04-01.md nur bei Bedarf als historisches Archiv lesen."

  project:
    name: "mr"
    display_name: "Multi-Edit Revisited"
    path: "/home/idoc/mr"
    branch: "main"
    head_commit: "dynamisch via git rev-parse --short HEAD"
    git_status:
      clean_tracked_files: "dynamisch via git status --short"
      untracked: "dynamisch via git status --short"

  collaboration_constraints:
    formal_address_required: true
    address_mode_allowed:
      - "Sie"
      - "Dr. Raus"
    decisions_require_options_and_recommendation: true
    no_plan_progress_without_approval: true
    report_only_after_self_test: true
    report_only_after_self_test_note: "User wird erst adressiert, nachdem Codex die Aenderung im PTY selbst getestet hat."
    version_management_responsibility: "AI verwaltet die Versionsnummer des Compilats."
    setup_settings_key_policy: "Wenn neue Setup-Settings hinzukommen, User mit Vorschlag fuer den exakten settings.mrmac-Key befragen (analog zu bestehenden Keys: 'SETTINGSPATH', 'MACROPATH', 'HELPPATH', 'TEMPDIR', 'SHELLPATH')."
    setup_bool_value_policy: "Bool-Werte in settings.mrmac werden als true/false gefuehrt (nicht 1/0)."
    settings_schema_migration_policy: "Legacy-Ballast in settings.mrmac wird abgeschnitten: Compile-Defaults sind das Schema. Beim Laden werden nur bekannte Keys in die zentralen Stores uebernommen; unbekannte Keys werden still verworfen, fehlende Keys still mit Compile-Defaults aufgefuellt. SETTINGS_VERSION wird auf die Version des Compilats normalisiert und beim Speichern entsprechend geschrieben."
    settings_store_architecture_policy: "Load, Save und Bootstrap/Upgrade docken an dieselben zentralen Key/Value-Stores an. Compile-Default-Hashes definieren die erlaubten Keys und zugleich den vollstaendigen Zielzustand."
    settings_save_policy: "Beim Speichern werden immer alle bekannten globalen Key/Value-Paare vollstaendig nach settings.mrmac geschrieben; Extension-Profile werden ebenfalls immer vollstaendig geschrieben, so dass fehlende Keys nach einem Upgrade automatisch ergaenzt werden."
    settings_store_shape_policy: "Keine Registry und keine zweite allgemeine Metaschicht aufbauen. Fuer globale Settings einen zentralen Default-/Werte-Hash verwenden; fuer Extension-Profile einfache Profile-Records mit validierter Profil-ID und eigenem Key/Value-Store verwenden."
    settings_load_validation_policy: "Ein Key ist gueltig, wenn er im passenden Compile-Default-Store existiert. Unbekannte Keys werden verworfen. Bei bekannten Keys wird beim Load keine zusaetzliche semantische Migration oder Normalisierung von Legacy-Werten betrieben; unbekannte oder fehlende Eintraege fallen auf Compile-Defaults zurueck."
    handoff_patch_policy: "Kein Handoff mehr als Tar-Archiv. Handoffs werden als komprimierter Patch uebergeben; die passende Befehlskette zur Anwendung des Patches ist immer mitzuliefern."
    performance_protection_policy: "Bei neuen Infrastrukturzuegen (insb. Settings) keinen Boilerplate-Apparat aufbauen und nichts in heisse Dateilade-/Line-Indexierungs-Pfade ziehen. Gehärteter C++20-Code, einfache Datenwege, alte Pfade entfernen statt parallel weitertragen."
    edit_settings_keyset_v1:
      - "PAGEBREAK"
      - "WORDDELIMS"
      - "DEFAULTEXTS"
      - "TRUNCSPACES"
      - "EOFCTRLZ"
      - "EOFCRLF"
      - "TABEXPAND"
      - "COLBLOCKMOVE"
      - "DEFAULTMODE"
    setup_dialog_mnemonic_policy: "Neue Dialoge erhalten durch Codex geeignete Highlight-/Shortcut-Buchstaben autonom; dazu keine Rueckfrage an den User."
    workspace_delete_policy: "Datei-Loeschungen im Workspace duerfen ohne vorherige Rueckfrage ausgefuehrt werden (User-Backups vorhanden)."
    new_source_directory_policy: "Neue Source-/Code-Ordner duerfen nur nach vorheriger Rueckfrage an den User mit kurzer Begruendung angelegt werden."
    ui_uniform_treatment_policy: "Alle Dialoge und alle Fenster werden nach denselben zentralen UI-/Palette-Regeln behandelt; keine Sonderbehandlung einzelner Views/Dialoge/Fenster."
    standards_deviation_warning_policy: "Wenn eine User-Forderung den zentralen UI-/Palette-Standard verlassen wuerde, muss Codex vor Umsetzung explizit warnen und den Tradeoff benennen."
    tvision_palette_model_hard_gate:
      - "zentrale Palette-Quelle"
      - "keine per-View-Sonderfarben"
      - "atomisches Anwenden auf Dialog-/Fenster-Gruppen"
    tvision_palette_model_refuse_policy: "Codex verweigert jede Implementierung, die den obigen TVision-Paletten-Hard-Gate verletzt (Regressionsschutz)."
    no_agentic_slop_policy: "Kein agentic slop: keine toten Pfade, keine doppelten Implementierungen, keine ueberfluessigen String-Literale, keine halb-abgerissenen Restpfade."
    strict_no_guard_backpacks: true
    coding_style:
      no_guard_backpacks_policy: "Keine symptomatischen Guard-Workarounds ('Guard-Rucksaecke'). Fehler werden an der Ursache behoben. Guards sind nur fuer echte externe Randfaelle zulaessig (IO, Benutzerinput, OS/API-Vertraege), nicht zur Kaschierung interner Logikfehler."
    hard_efficiency_policy: "Hart effizient codieren: zuerst bestehende Routinen/Mechaniken wiederverwenden, dann minimal erweitern; keine funktionsgleichen Parallelpfade aufbauen."
    single_path_policy: "Pro Feature ein klarer zentraler Ausfuehrungspfad; Duplikatlogik wird zusammengefuehrt statt kopiert."
    dead_code_zero_tolerance_policy: "Unbenutzter Code/Variablen/Legacy-Zweige sind zu entfernen; neuer Code bleibt schlank, strukturiert und wartbar."
    parser_dispatch_table_policy: "In Parser-/Compiler-Pfaden (insb. mrmac) sind lange String-Dispatch-Ketten per if/else oder OR-verknuepfter strcasecmp-Aufrufe verboten. Pflicht ist ein tabellengetriebenes Dispatch-/Signaturmodell mit zentraler Validierung (Name, Argumenttypen/Arity, Zielaktion). Neue Statements/Intrinsics/Builtins werden nur durch Tabelleneintraege und gemeinsame Helfer erweitert."
    parser_dispatch_refactor_trigger_policy: "Wenn ein Dispatchpfad mehr als drei Name-Vergleichsaeste oder duplizierte Arity-/Typpruefung zeigt, muss vor weiterem Feature-Ausbau auf das zentrale Tabellenmodell refaktoriert werden."
    if_chain_refactor_threshold_policy: "Wenn eine if/else-Kette mehr als 5 vergleichbare Zweige enthaelt, muss sie vor weiterem Ausbau refaktoriert werden."
    conditional_dispatch_form_policy: "Dispatch-Regel: switch nur bei gemeinsamem Diskriminator (typisch enum/Token). Bei String-Dispatch ist statt switch verpflichtend ein tabellengetriebenes Modell mit zentraler Validierung zu verwenden."
    tvision_standard_nearness_policy: "Standardnaehe zu magiblot/TVision ist zwingend. Keine nicht standardnahen UI-Workarounds oder Overlay-Konstruktionen, wenn eine TVision-nahe Loesung moeglich ist."
    engineering_priority_policy: "Dieses Projekt optimiert nicht auf Geschwindigkeit der Fertigstellung. Prioritaet haben technische Exzellenz, saubere Architektur und robuste, standardnahe Implementierung."

  repository_conventions:
    markdown_docs_location: "/home/idoc/mr/documentation"
    misc_policy: "misc ist nur temporaere Muellhalde/Probe-Ablage und keine dauerhafte Doku-Ablage."
    workspace_hygiene: "Workspace stets aufgeraeumt halten; keine Datei-Muellhalden, Artefakte und Probes nur bei Bedarf erzeugen und danach bereinigen."
    running_protocol_file: "/home/idoc/mr/documentation/CHANGELOG_CONTEXT.md"

  decision_lock:
    tvision_strategy: "git_subtree_plus_patch_queue"
    subtree_or_submodule: "subtree_ja_submodule_nein"
    note: "TVision als git subtree unter ./tvision fuehren; lokale Abweichungen ausschliesslich als Patch-Queue in ./patches."

  build_and_run:
    build_command: "make mr"
    main_binary: "/home/idoc/mr/mr"
    expected_result: "Build erfolgreich"
    validated_checks:
      - "make mr"
      - "make regression-check"
      - "make regression-probe"
      - "./regression/mr-regression-checks --probe staged-nav"
      - "./regression/mr-regression-checks --probe staged-mark-page"
      - "make mrmac-v1-check"

  tvision_integration:
    default_mode: "lokale Quellen unter ./tvision, Build nach ./tvision/build"
    optional_mode: "kein separater Vendor-Cache-Modus"
    sync_mechanism:
      upstream_url: "https://github.com/magiblot/tvision.git"
      subtree_prefix: "./tvision"
      upstream_remote: "tvision-upstream"
      patches_dir: "./patches"
    rules:
      - "git subtree ist der verbindliche Upstream-Pfad."
      - "Kein git submodule fuer TVision."
      - "Build-Artefakte nicht als Upstream-Quell-Diff behandeln."
    operational_workflow:
      goal: "Lokale TVision-Weiterentwicklung bei gleichzeitig upstream-faehigen Diffs"
      steps:
        - "1) Upstream holen: make tvision-upstream-fetch"
        - "2) Subtree aktualisieren: make tvision-subtree-pull"
        - "3) Lokale Patches anwenden: make tvision-apply-patches"
        - "4) Sicherer Gesamtpfad: make tvision-sync-safe"
        - "5) Vor Uebergabe sicherstellen: keine Build-Artefakte als Quell-Aenderung markieren."
      do_not:
        - "Kein zweiter TVision-Quellpfad (Vendor-Mirror/Export) einfuehren."
        - "Keine TVision-Build-Ausgaben in Commit-Diffs aufnehmen."

  implemented_scope:
    mrmac_runtime:
      - "TO/FROM Bindings aktiv"
      - "RUN_MACRO + staged/background Profile aktiv"
      - "Bytecode nur in RAM, keine Persistenzdatei"
      - "KEY_IN Reentranzschutz aktiv (Segfault-Fix)"
      - "TVCALL MESSAGEBOX ist case-insensitiv akzeptiert (MessageBox und MESSAGEBOX laufen identisch)."
    keystroke_recording:
      - "Alt-F10 Start/Stop"
      - "Statuszeilen-Hinweis vorhanden"
      - "Blinkender Recording-Marker im Frame"
      - "Bind-Key Capture via 'Press key to bind'"
    macro_manager:
      - "Dialog: Create/Delete/Copy/Edit/Bind/Playback"
      - "Bind<F2> schreibt persistent TO <Key> in .mrmac"
      - "Header-Rewrite + Recompile-Validierung + Reload"
    startup_binding_strategy:
      name: "Hybrid (Bootstrap-Index + Warmup + On-Demand)"
      details:
        - "Beim Start: Index aller gebundenen Makros aus .mrmac Quellen"
        - "Danach: inkrementelles Warmup geladener Bind-Dateien"
        - "Fallback: On-Demand Laden beim ersten Hotkey"

  current_ui_state:
    frame_markers:
      dirty: "✍"
      insert: "✚"
      recording: "📼"
      background: "🧠"
      readonly: "🔒"
      style: "Markerblock in eckigen Klammern"
    frame_focus_rule: "Zentralregel in ui/TMRFrame.cpp: visuelle Fokusdarstellung (Doppelrahmen/Controls) nur ueber Fokusstatus (sfFocused) plus Modal-TopView-Gate; nicht ueber sfActive/sfSelected; nie lokal pro Dialog patchen."
    dialog_button_row_rule: "Dialog-Buttonreihen konsistent in einer zentrierten Zeile ausrichten (Done/Cancel/Help wie Window-List-Stil), keine rechts abdriftenden Einzelbuttons."
    ui_quality_gate_rule: "Kein Fortschrittsbericht ohne lokalen PTY-Selbsttest der betroffenen Dialoge/Fenster. Pflichtkriterien: geometrisch sauber (Ausrichtung, Abstaende, Zentrierung), keine abgeschnittenen Controls, korrekte Scrollbars/Farben, Fokusrahmen nur am fokussierten Objekt."
    ui_quality_gate_sizes_rule: "Pflichtgroessen fuer UI-Selbsttests: mindestens 80x25 sowie aktuelle Problemgrenzen. Bei Fehlern zuerst Fix, dann erst weiterer Planfortschritt."
    ui_regression_zero_tolerance_rule: "UI-Regressionen haben Prioritaet 0. Neue Features duerfen erst weitergefuehrt werden, wenn die Darstellung stabil ist und alle betroffenen Oberflaechen lokal im PTY getestet wurden."
    setup_defaults_rule: "Defaults fuer Setup-Pfade/URIs zentral ueber eine Routine bestimmen; Bootstrap und Setup-Dialog muessen dieselbe Default-Quelle nutzen."
    path_uri_naming_rule: "Felder mit Datei (Pfad+Dateiname) als 'URI' benennen; reine Ordnerfelder als 'path'. Datei-URIs in Dialog-Vorbelegung absolut halten."
    setup_layout_profile_rule: "Setup-Dialoge folgen einem zentralen compact/relaxed-Layoutstandard (80x25-first); keine separaten Dialog-Implementierungen, nur profilabhaengige Geometrie."
    dialog_contrast_rule: "Schwarz auf Grau fuer Lesbarkeit"
    dialog_scrollbar_palette_policy: "Dialog-Scrollbars werden TVision-weit zentral ueber die globale Dialog-Palette gesteuert und an Dialog-Rahmenfarben angeglichen; keine Einzelbehandlung einzelner Views/Dialoge."
    visual_limit_notes:
      - "Terminal- und Font-Rendering beeinflussen Glyph-Look sichtbar"
      - "VSCode internal terminal ist keine verlaessliche Pixelreferenz"
      - "Abnahme fuer Pattern/Glyphen im externen Terminal durchfuehren"

