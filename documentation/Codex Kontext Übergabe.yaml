        - "Settings-Generator auf MRMAC-konformes Single-Quote-Format fuer MRSETUP umgestellt; silent reload mit schreibbarer Settings-URI im PTY verifiziert."
        - "Runtime-Pfadresolver ohne hartkodierte Datei-URI-Literale; Datei-Defaults werden dynamisch aus Env/CWD/Exe-Dir gebildet."
        - "About-Zitate-Rotation: unseen-bag mit Seen-Tracking; keine Wiederholung, bevor alle anderen Zitate gezeigt wurden."
    - date: "2026-04-01"
      topic: "Setup Edit-Settings Option 1 implementiert"
      notes:
        - "MRSETUP-Whitelist erweitert um: PAGEBREAK, WORDDELIMS, DEFAULTEXTS, TRUNCSPACES, EOFCTRLZ, EOFCRLF, TABEXPAND, COLBLOCKMOVE, DEFAULTMODE."
        - "settings.mrmac-Generator schreibt diese Keys mit Bool-Literalen true/false."
        - "Installation/Setup -> Edit settings ist jetzt ein echter Dialog (Done/Cancel/Help) mit silent reload."
        - "Open/Load nutzt DEFAULTEXTS als Fallbackliste, sofern kein expliziter Dateityp angegeben ist."
        - "Neue Fenster uebernehmen DEFAULTMODE; Reload uebernimmt DEFAULTMODE auch fuer offene editierbare Fenster."
        - "PAGEBREAK wird in NEXT_PAGE_BREAK/LAST_PAGE_BREAK runtime-seitig aus Settings gelesen."
        - "Build/Test lokal geprueft: make mr und make regression-check (6/6 pass)."
