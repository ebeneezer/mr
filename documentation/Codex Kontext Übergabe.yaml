      - "Build-Artefakte nicht als Upstream-Quell-Diff behandeln."
    operational_workflow:
      goal: "Lokale TVision-Weiterentwicklung bei gleichzeitig upstream-faehigen Diffs"
      steps:
        - "1) TVision-Aenderungen nur unter ./tvision vornehmen und lokal mit make mr pruefen."
        - "2) Bei Bedarf optionalen Sync mit TVISION_AUTO_SYNC=1 nutzen, um Mirror/Export/Patch-Pfad zu fahren."
        - "3) Upstream-relevante Aenderungen als saubere, kleine Patches unter ./patches ablegen."
        - "4) Vor Uebergabe sicherstellen: keine Build-Artefakte als Quell-Aenderung markieren."
        - "5) Upstream-Abgleich immer ueber Cache-Repo ./.vendor-cache/tvision.git und vendor_root ./build/vendor."
      do_not:
        - "Kein git subtree/submodule einfuehren."
        - "Keine TVision-Build-Ausgaben in Commit-Diffs aufnehmen."

  implemented_scope:
