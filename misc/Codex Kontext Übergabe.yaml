    related_docs:
      - "/home/idoc/mr/misc/KONTEXTWECHSEL_2026-04-01.md"

  project:
    name: "mr"
    display_name: "Multi-Edit Revisited"
    path: "/home/idoc/mr"
    branch: "main"
    head_commit: "6d68110"
    git_status:
      clean_tracked_files: true
      untracked: []

  collaboration_constraints:
    formal_address_required: true
    address_mode_allowed:
      - "Sie"
      - "Dr. Raus"
    decisions_require_options_and_recommendation: true
    no_plan_progress_without_approval: true
    version_management_responsibility: "AI verwaltet die Versionsnummer des Compilats."

  decision_lock:
    tvision_strategy: "vendoring_sync"
    subtree_or_submodule: "nein"
    note: "Kein git-subtree Workflow aktivieren; bestehende Vendoring-Sync-Logik beibehalten."

  build_and_run:
    build_command: "make mr"
    main_binary: "/home/idoc/mr/mr"
    expected_result: "Build erfolgreich"
    validated_checks:
      - "make mr"
      - "make keyin-probe tofrom-probe tofrom-dispatch-probe"
      - "./misc/mr_keyin_probe"
      - "./misc/mr_tofrom_probe"
      - "./misc/mr_tofrom_dispatch_probe"
      - "make mrmac-v1-check"

  tvision_integration:
    default_mode: "lokale Quellen unter ./tvision, Build nach ./tvision/build"
    optional_mode: "TVISION_AUTO_SYNC=1 (Mirror/Export/Patch in Vendor-Pfad)"
    sync_mechanism:
      upstream_url: "https://github.com/magiblot/tvision.git"
      cache_repo: "./.vendor-cache/tvision.git"
      vendor_root: "./build/vendor"
      patches_dir: "./patches"
    rules:
      - "Keine git subtree Kommandos verwenden."
      - "Build-Artefakte nicht als Upstream-Quell-Diff behandeln."
    operational_workflow:
      goal: "Lokale TVision-Weiterentwicklung bei gleichzeitig upstream-faehigen Diffs"
      steps:
        - "1) TVision-Aenderungen nur unter ./tvision vornehmen und lokal mit make mr pruefen."
        - "2) Bei Bedarf optionalen Sync mit TVISION_AUTO_SYNC=1 nutzen, um Mirror/Export/Patch-Pfad zu fahren."
        - "3) Upstream-relevante Aenderungen als saubere, kleine Patches unter ./patches ablegen."
        - "4) Vor Uebergabe sicherstellen: keine Build-Artefakte als Quell-Aenderung markieren."
        - "5) Upstream-Abgleich immer ueber Cache-Repo ./.vendor-cache/tvision.git und vendor_root ./build/vendor."
      do_not:
        - "Kein git subtree/submodule einfuehren."
        - "Keine TVision-Build-Ausgaben in Commit-Diffs aufnehmen."

  implemented_scope:
    mrmac_runtime:
      - "TO/FROM Bindings aktiv"
      - "RUN_MACRO + staged/background Profile aktiv"
      - "Bytecode nur in RAM, keine Persistenzdatei"
      - "KEY_IN Reentranzschutz aktiv (Segfault-Fix)"
    keystroke_recording:
      - "Alt-F10 Start/Stop"
      - "Statuszeilen-Hinweis vorhanden"
      - "Blinkender Recording-Marker im Frame"
      - "Bind-Key Capture via 'Press key to bind'"
    macro_manager:
      - "Dialog: Create/Delete/Copy/Edit/Bind/Playback"
      - "Bind<F2> schreibt persistent TO <Key> in .mrmac"
      - "Header-Rewrite + Recompile-Validierung + Reload"
    startup_binding_strategy:
      name: "Hybrid (Bootstrap-Index + Warmup + On-Demand)"
      details:
        - "Beim Start: Index aller gebundenen Makros aus .mrmac Quellen"
        - "Danach: inkrementelles Warmup geladener Bind-Dateien"
        - "Fallback: On-Demand Laden beim ersten Hotkey"

  current_ui_state:
